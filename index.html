<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#070B10;color:#F2F5F7;font-family:'Barlow Condensed',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.splash{text-align:center;cursor:pointer}
.splash-logo{max-width:480px;width:80%;animation:sfi 1.5s ease both;margin-bottom:2rem}
.splash-tagline{font-size:0.72rem;letter-spacing:0.4em;text-transform:uppercase;color:#8C9BAB;animation:sfi 1.5s 0.5s ease both;margin-bottom:3rem}
.splash-enter{font-size:0.68rem;letter-spacing:0.3em;text-transform:uppercase;color:#B11F2A;border:1px solid rgba(177,31,42,0.4);padding:0.6rem 2rem;background:rgba(177,31,42,0.15);cursor:pointer;transition:all 0.3s;animation:sfi 1.5s 1s ease both;text-decoration:none;display:inline-block}
.splash-enter:hover{background:#B11F2A;color:#F2F5F7;border-color:#B11F2A}
.corner{position:absolute;width:60px;height:60px;border-color:rgba(177,31,42,0.25);border-style:solid}
.corner-tl{top:2rem;left:2rem;border-width:1px 0 0 1px}
.corner-tr{top:2rem;right:2rem;border-width:1px 1px 0 0}
.corner-bl{bottom:2rem;left:2rem;border-width:0 0 1px 1px}
.corner-br{bottom:2rem;right:2rem;border-width:0 1px 1px 0}
@keyframes sfi{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
</style>
